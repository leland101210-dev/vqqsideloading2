<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VQQSideLoading</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<style>
body {
  margin:0;
  background:#000;
  color:white;
  font-family:sans-serif;
}

/* Animated logo */
.logo {
  font-size:28px;
  font-weight:bold;
  background:linear-gradient(90deg,#9b5cff,#5ce1e6,#9b5cff);
  background-size:200%;
  -webkit-background-clip:text;
  color:transparent;
  animation: glow 3s linear infinite;
}

@keyframes glow {
  0% {background-position:0%;}
  100% {background-position:200%;}
}

/* Header */
header {
  display:flex;
  justify-content:space-between;
  padding:20px;
}

/* App grid */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:20px;
  padding:20px;
}

.app {
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:15px;
  transition:0.3s;
}

.app:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px #9b5cff;
}

/* Buttons */
.btn {
  padding:8px 15px;
  border:none;
  border-radius:20px;
  background:linear-gradient(90deg,#9b5cff,#5ce1e6);
  color:white;
  cursor:pointer;
}

/* Upload zone */
#uploadZone {
  border:2px dashed #9b5cff;
  padding:30px;
  text-align:center;
  margin:20px;
  display:none;
}

/* Stars */
.star {
  color:gray;
  cursor:pointer;
}
.star.active {
  color:gold;
}
</style>
</head>

<body>

<header>
  <div class="logo">VQQ</div>
  <div>
    <button class="btn" onclick="googleLogin()">Google</button>
  </div>
</header>

<div id="uploadZone">Drag & Drop IPA Here (Admin Only)</div>

<div class="grid" id="appGrid"></div>

<section style="text-align:center">
  <h2>Live Reviews</h2>
  <div id="stars"></div>
  <input id="reviewInput" placeholder="Write review">
  <button class="btn" onclick="submitReview()">Post</button>

  <div id="reviews"></div>
</section>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let user = null;
let rating = 0;

// GOOGLE LOGIN
function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

// AUTH STATE
auth.onAuthStateChanged(u=>{
  if(u){
    user = u;

    // ADMIN CHECK
    if(u.email === "leland101210@icloud.com"){
      document.getElementById("uploadZone").style.display="block";
    }
  }
});

// DRAG & DROP UPLOAD
const uploadZone = document.getElementById("uploadZone");

uploadZone.addEventListener("dragover", e=>{
  e.preventDefault();
});

uploadZone.addEventListener("drop", e=>{
  e.preventDefault();

  const file = e.dataTransfer.files[0];

  const ref = storage.ref("ipas/" + file.name);
  ref.put(file).then(()=>{
    ref.getDownloadURL().then(url=>{
      db.collection("apps").add({
        name:file.name,
        link:url
      });
    });
  });
});

// LOAD APPS (REAL-TIME)
db.collection("apps").onSnapshot(snapshot=>{
  const grid = document.getElementById("appGrid");
  grid.innerHTML="";

  snapshot.forEach(doc=>{
    const app = doc.data();

    grid.innerHTML += `
      <div class="app">
        <h3>${app.name}</h3>
        <button class="btn" onclick="install('${app.link}')">Install</button>
      </div>
    `;
  });
});

// INSTALL
function install(link){
  if(/iPhone/i.test(navigator.userAgent)){
    alert("Use a signing service to install.");
  }
  window.location.href = link;
}

// STARS
for(let i=1;i<=5;i++){
  let s=document.createElement("span");
  s.innerHTML="★";
  s.className="star";
  s.onclick=()=>{
    rating=i;
    updateStars();
  };
  document.getElementById("stars").appendChild(s);
}

function updateStars(){
  document.querySelectorAll(".star").forEach((s,i)=>{
    s.classList.toggle("active", i<rating);
  });
}

// REALTIME REVIEWS
function submitReview(){
  db.collection("reviews").add({
    user:user ? user.email : "anon",
    text:document.getElementById("reviewInput").value,
    rating:rating,
    time:Date.now()
  });
}

db.collection("reviews").orderBy("time","desc")
.onSnapshot(snapshot=>{
  const container = document.getElementById("reviews");
  container.innerHTML="";

  snapshot.forEach(doc=>{
    let r=doc.data();
    container.innerHTML += `
      <p><b>${r.user}</b> (${r.rating}★): ${r.text}</p>
    `;
  });
});
</script>

</body>
</html>
